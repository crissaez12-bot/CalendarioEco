services:
  - type: web
    name: the-empire-session
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    autoDeploy: true

  - type: cron
    name: update-calendar
    runtime: node
    plan: starter
    schedule: "0 9 * * 1"
    buildCommand: npm install
    startCommand: npm run update-calendar
    envVars:
      - key: GITHUB_TOKEN
        sync: false
      - key: GIT_REPO
        sync: false

  # Corre cada hora (el script decide internamente que actualizar segun la
  # hora Chile — ver comentario en scripts/update-news.mjs). El ticker de
  # precios se actualiza en TODAS las corridas; noticias solo a las 8/12/16;
  # etf flows/earnings/unlocks solo a las 8am.
  - type: cron
    name: update-news
    runtime: node
    plan: starter
    schedule: "0 * * * *"
    buildCommand: npm install
    startCommand: npm run update-news
    envVars:
      - key: GITHUB_TOKEN
        sync: false
      - key: GIT_REPO
        sync: false
