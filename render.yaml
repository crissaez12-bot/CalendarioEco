services:
  - type: web
    name: the-empire-session
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    autoDeploy: true

  - type: cron
    name: update-calendar
    runtime: node
    plan: free
    schedule: "0 9 * * 1"
    buildCommand: npm install
    startCommand: npm run update-calendar
    envVars:
      - key: GITHUB_TOKEN
        sync: false
      - key: GIT_REPO
        sync: false
